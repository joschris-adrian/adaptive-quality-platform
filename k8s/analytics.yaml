apiVersion: apps/v1
kind: Deployment
metadata:
  name: analytics
  namespace: adaptive-quality
spec:
  replicas: 1
  selector:
    matchLabels:
      app: analytics
  template:
    metadata:
      labels:
        app: analytics
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port:   "8004"
        prometheus.io/path:   "/metrics"
    spec:
      containers:
        - name: analytics
          image: adaptive-quality/analytics:latest
          command: ["python", "-m", "services.analytics.consumer"]
          ports:
            - containerPort: 8004
          envFrom:
            - configMapRef:
                name: platform-config
            - secretRef:
                name: platform-secrets
          resources:
            requests:
              cpu:    "100m"
              memory: "256Mi"
            limits:
              cpu:    "500m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8004
            initialDelaySeconds: 15
            periodSeconds:       10

---
apiVersion: v1
kind: Service
metadata:
  name: analytics
  namespace: adaptive-quality
spec:
  selector:
    app: analytics
  ports:
    - port: 8004
      targetPort: 8004