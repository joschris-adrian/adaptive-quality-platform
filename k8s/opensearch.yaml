apiVersion: apps/v1
kind: Deployment
metadata:
  name: opensearch
  namespace: adaptive-quality
spec:
  replicas: 1
  selector:
    matchLabels:
      app: opensearch
  template:
    metadata:
      labels:
        app: opensearch
    spec:
      containers:
        - name: opensearch
          image: opensearchproject/opensearch:2.13.0
          ports:
            - containerPort: 9200
          env:
            - name: discovery.type
              value: single-node
            - name: DISABLE_SECURITY_PLUGIN
              value: "true"
            - name: OPENSEARCH_JAVA_OPTS
              value: "-Xms512m -Xmx512m"
---
apiVersion: v1
kind: Service
metadata:
  name: opensearch
  namespace: adaptive-quality
spec:
  selector:
    app: opensearch
  ports:
    - port: 9200
      targetPort: 9200