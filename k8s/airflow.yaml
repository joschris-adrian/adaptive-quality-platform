apiVersion: apps/v1
kind: Deployment
metadata:
  name: airflow
  namespace: adaptive-quality
spec:
  replicas: 1
  selector:
    matchLabels:
      app: airflow
  template:
    metadata:
      labels:
        app: airflow
    spec:
      containers:
        - name: airflow
          image: apache/airflow:2.9.1
          ports:
            - containerPort: 8080
          env:
            - name: AIRFLOW__CORE__EXECUTOR
              value: LocalExecutor
            - name: AIRFLOW__DATABASE__SQL_ALCHEMY_CONN
              valueFrom:
                secretKeyRef:
                  name: adaptive-quality-secret
                  key: AIRFLOW_DB_URI
            - name: AIRFLOW__CORE__LOAD_EXAMPLES
              value: "false"
          command: ["airflow", "standalone"]
          volumeMounts:
            - name: dags
              mountPath: /opt/airflow/dags
      volumes:
        - name: dags
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: airflow
  namespace: adaptive-quality
spec:
  selector:
    app: airflow
  ports:
    - port: 8080
      targetPort: 8080