apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: detection-scaledobject
  namespace: adaptive-quality
spec:
  scaleTargetRef:
    name: detection
  minReplicaCount: 2
  maxReplicaCount: 10
  cooldownPeriod:  30
  triggers:
    - type: kafka
      metadata:
        bootstrapServers: kafka:9092
        consumerGroup:    detection-service
        topic:            raw-events
        lagThreshold:     "500"
        offsetResetPolicy: latest

