apiVersion: apps/v1
kind: Deployment
metadata:
  name: detection
  namespace: adaptive-quality
spec:
  replicas: 2
  selector:
    matchLabels:
      app: detection
  template:
    metadata:
      labels:
        app: detection
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port:   "8001"
        prometheus.io/path:   "/metrics"
    spec:
      containers:
        - name: detection
          image: adaptive-quality/detection:latest
          command: ["python", "-m", "services.detection.consumer"]
          ports:
            - containerPort: 8001
          envFrom:
            - configMapRef:
                name: platform-config
            - secretRef:
                name: platform-secrets
          resources:
            requests:
              cpu:    "250m"
              memory: "512Mi"
            limits:
              cpu:    "1000m"
              memory: "1Gi"
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8001
            initialDelaySeconds: 15
            periodSeconds:       10
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8001
            initialDelaySeconds: 5
            periodSeconds:       5

---
apiVersion: v1
kind: Service
metadata:
  name: detection
  namespace: adaptive-quality
spec:
  selector:
    app: detection
  ports:
    - port: 8001
      targetPort: 8001

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: detection-hpa
  namespace: adaptive-quality
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: detection
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type:               Utilization
          averageUtilization: 70
    - type: External
      external:
        metric:
          name: kafka_consumer_lag
          selector:
            matchLabels:
              topic: raw-events
              group: detection-service
        target:
          type:         AverageValue
          averageValue: "1000"